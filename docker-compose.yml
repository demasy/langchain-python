services:
  # The Ollama model server. Runs the local LLM; no API key or cost.
  ollama:
    image: ollama/ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      # Persist downloaded models so they are not re-pulled on every run.
      - ollama_data:/root/.ollama
    healthcheck:
      # The app waits until this passes before starting.
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Our LangChain agent, built from the local Dockerfile.
  app:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    # All values come from the .env file (see .env.example).
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - TZ=${TZ:-Asia/Riyadh}
    # Both required for the interactive REPL (reading input from the terminal).
    stdin_open: true
    tty: true

volumes:
  ollama_data:
